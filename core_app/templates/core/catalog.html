{% extends 'layouts/base.html' %}
{% load static %}
{% block content %}
<h2 class="mb-4">Catalogo</h2>
<div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    
    <div class="col">
        <div class="card h-100 shadow-sm">
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=500&auto=format&fit=crop" class="card-img-top" alt="Libro" style="height: 250px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title text-truncate">El Principito</h5>
                <p class="card-text text-muted small">Antoine de Saint-Exupéry</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold text-primary">$15.00</span>
                    <button class="btn btn-sm btn-outline-primary">Añadir</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
