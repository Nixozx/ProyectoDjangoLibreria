{% load static %}
<!DOCTYPE html>
<html lang="es">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img src="{% static 'navlogo.png' %}" alt="Logo Library" class="nav-logo" height="40">
            <span class="ms-2">Libreria Ruina</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Libros</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-light me-3">Hola, <strong>{{ user.username }}</strong></span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                     {% csrf_token %}
                     <button type="submit" class="btn btn-sm btn-outline-danger">Cerrar Sesión</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-info me-2">Login</a>
                    <a href="#" class="btn btn-sm btn-info">Registro</a>
                {% endif %}
            </div>
    </div>
</nav>
</html>
