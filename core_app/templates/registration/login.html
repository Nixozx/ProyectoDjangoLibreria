{% extends 'layouts/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px; background-color: #1f1f23; border: 1px solid #303032; border-radius: 10px;">
        
        <h3 class="text-center mb-4 text-white fw-bold">Iniciar Sesión</h3>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-white fw-bold small">Usuario</label>
                <input type="text" name="username" class="custom-input" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white fw-bold small">Contraseña</label>
                <input type="password" name="password" class="custom-input" required>
            </div>

            <button type="submit" class="btn-modern-light w-100 py-2 mt-3">
                INGRESAR
            </button>
        </form>

        {% if form.errors %}
            <div class="text-danger small fw-bold mt-3 text-center">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <div class="mt-4 pt-3 border-top border-secondary text-center">
            <p class="text-white-50 small">
                ¿No tienes cuenta? 
                <a href="{% url 'register' %}" class="text-white fw-bold text-decoration-none border-bottom border-light">Regístrate</a>
            </p>
        </div>
    </div>
</div>

<style>
    .custom-input {
        width: 100%;
        padding: 10px;
        background-color: #0e0e10 !important;
        border: 1px solid #3f3f46 !important;
        color: #ffffff !important;
        border-radius: 4px;
        outline: none;
    }

    .custom-input:focus {
        border-color: #ffffff !important;
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }

    .btn-modern-light {
        background-color: #ffffff;
        color: #000000;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        transition: 0.3s;
        letter-spacing: 1px;
    }

    .btn-modern-light:hover {
        background-color: #cccccc;
        cursor: pointer;
    }

    .text-danger {
        color: #ff4a4a !important;
    }
</style>
{% endblock %}
