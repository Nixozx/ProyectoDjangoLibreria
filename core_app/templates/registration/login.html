{% extends 'layouts/base.html' %}

{% block content %}
<div class="login-wrapper d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow-lg login-card">
        
        <h3 class="text-center mb-4 text-white fw-bold">Iniciar Sesión</h3>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-white fw-bold small">Usuario</label>
                <input type="text" name="username" class="custom-input" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white fw-bold small">Contraseña</label>
                <input type="password" name="password" class="custom-input" required>
            </div>

             
            <button type="submit" class="btn-ruina-success w-100 py-2 mt-3">
                INGRESAR
            </button>
        </form>

        {% if form.errors %}
            <div class="text-danger small fw-bold mt-3 text-center">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <div class="mt-4 pt-3 border-top border-secondary text-center">
            <p class="text-white-50 small">
                ¿No tienes cuenta? 
                <a href="{% url 'register' %}" class="text-white fw-bold text-decoration-none border-bottom border-light">Regístrate</a>
            </p>
        </div>
    </div>
</div>

<style>
     
    body {
        background-color: #1a1a1c !important;
    }

    .login-wrapper {
        min-height: 85vh;
    }

     
    .login-card {
        width: 100%;
        max-width: 400px;
        background-color: #252529 !important;  
        border: 1px solid #3f3f46 !important;
        border-radius: 12px;
    }

    .custom-input {
        width: 100%;
        padding: 10px;
        background-color: #0e0e10 !important;
        border: 1px solid #3f3f46 !important;
        color: #ffffff !important;
        border-radius: 4px;
        outline: none;
    }

    .custom-input:focus {
        border-color: #ffffff !important;
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }

    /* Estilo original de la imagen image_8e5e44.png */
    .btn-ruina-success {
        background-color: #ffffff;
        color: #000000;
        border: 2px solid #28a745;
        border-radius: 4px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s ease;
        box-shadow: 4px 4px 0px #28a745; 
        cursor: pointer;
    }

    .btn-ruina-success:hover {
        background-color: #f2f2f2;
        box-shadow: 0px 0px 0px #28a745;
        transform: translate(3px, 3px);
    }

    .btn-ruina-success:active {
        transform: translate(4px, 4px);
    }

    .text-danger {
        color: #ff4a4a !important;
    }
</style>
{% endblock %}
